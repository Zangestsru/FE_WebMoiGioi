name: Deploy Frontend to Docker Hub

on:
  push:
    branches:
      - main
      - develop
      - cicd/setup

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            zangestsru/fe_bds:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_REGISTER_BG_IMAGE=${{ secrets.VITE_REGISTER_BG_IMAGE }}
            VITE_FACEBOOK_APP_ID=${{ secrets.VITE_FACEBOOK_APP_ID }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.ref == 'refs/heads/main' || 
      github.ref == 'refs/heads/develop' || 
      github.ref == 'refs/heads/cicd/setup'

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/bds

            # Dọn container cũ (nếu có - tạo bằng docker run tay từ trước)
            docker stop fe_bds_container 2>/dev/null || true
            docker rm   fe_bds_container 2>/dev/null || true

            # Kéo image mới nhất
            docker compose pull frontend

            # Khởi động service frontend (Nginx + Reverse Proxy)
            docker compose up -d frontend

            # Kiểm tra trạng thái
            docker compose ps
