name: Deploy Frontend to Docker Hub

on:
  push:
    branches:
      - main
      - develop
      - cicd/setup
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            zangestsru/fe_bds:latest
          build-args: |
            VITE_API_BASE_URL=https://your-domain.com/api/v1
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_FACEBOOK_APP_ID=${{ secrets.VITE_FACEBOOK_APP_ID }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.ref == 'refs/heads/main' || 
      github.ref == 'refs/heads/develop' || 
      github.ref == 'refs/heads/cicd/setup'

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/bds
            
            # Pull image mới nhất
            docker pull zangestsru/fe_bds:latest
            
            # Xử lý container cũ
            docker stop fe_bds_container || true
            docker rm fe_bds_container || true
            
            # Chạy container mới
            docker run -d \
              --name fe_bds_container \
              -p 81:80 \
              --restart always \
              zangestsru/fe_bds:latest
            
            # Kiểm tra nhanh
            docker ps | grep fe_bds_container



